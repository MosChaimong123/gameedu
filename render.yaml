# GameEdu Render Blueprint
# Create the Blueprint from:
# https://dashboard.render.com/blueprint/new?repo=https://github.com/MosChaimong123/gameedu
#
# This app runs as a single Node web service with:
# - Next.js 16
# - custom Node server (`server.ts` -> `dist/server.js`)
# - Socket.IO over the same origin
# - Prisma with MongoDB (bring your own Mongo Atlas cluster)
#
# First deploy checklist:
# 1. Create a MongoDB Atlas cluster and allow Render outbound access.
# 2. Fill all `sync: false` secrets in Render before the first boot.
# 3. After the first successful deploy, open Render Shell and run:
#    npx prisma db push
# 4. Optional seed:
#    npm run db:seed

services:
  - type: web
    name: gamedu-app
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: SOCKET_IO_CORS_ORIGIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RATE_LIMIT_STORE
        value: auto
      - key: AUDIT_LOG_SINK
        value: auto
      - key: HEALTHCHECK_DB_TIMEOUT_MS
        value: "3000"
