name: LINE auto reminders

# ยิง LINE auto-reminder job ทุกวัน
# Render ไม่มี scheduler ในตัว web service และ workflow นี้ไม่พึ่ง billing ของ Render
on:
  schedule:
    # 01:00 UTC = 08:00 เวลาไทย (ตรงกับค่า default LINE_REMINDER_CRON_HOUR=8)
    - cron: "0 1 * * *"
  # เผื่อกดยิงเองจากหน้า Actions เพื่อทดสอบ
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call LINE reminder job
        run: |
          status=$(curl -sS -o /tmp/body.txt -w "%{http_code}" \
            -X POST "${BASE_URL%/}/api/jobs/line-reminders" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "HTTP $status"
          cat /tmp/body.txt
          if [ "$status" != "200" ]; then
            echo "::error::LINE reminder job failed with HTTP $status"
            exit 1
          fi
        env:
          BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.LINE_REMINDER_CRON_SECRET }}
