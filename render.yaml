# GameEdu Render Blueprint
# https://dashboard.render.com/blueprint/new — เลือก repo นี้
#
# Stack: Next.js 16 + custom server (dist/server.js) + Socket.IO + Prisma (MongoDB)
#
# Deploy สำเร็จได้จริง:
# - build บังคับลง devDependencies (มี prisma CLI สำหรับ postinstall / build)
# - preDeploy รัน prisma db push ก่อนปล่อยรุ่นใหม่
#
# ก่อน deploy ครั้งแรก:
# 1. MongoDB Atlas — อนุญาตการเข้าถึงจาก Render
# 2. ตั้ง env ที่ sync: false ให้ครบ (DATABASE_URL, AUTH_*, URL สาธารณะ)
#    NEXTAUTH_URL + NEXT_PUBLIC_APP_URL ต้องเป็น HTTPS ของ service บน Render (เช่น https://gamedu-app.onrender.com) — ห้าม 0.0.0.0 หรือ localhost
# 3. NEXT_PUBLIC_* ฝังตอน build — ตั้งค่าใน Render ก่อน build แรก
# 4. Optional: Render Shell → npm run db:seed
# 5. Stripe (PLUS checkout + webhook): ไปที่ Dashboard → Environment และกรอกค่าตามชื่อคีย์ด้านล่าง (sync: false)
#    - STRIPE_SECRET_KEY = sk_live_... (Stripe Dashboard → API keys)
#    - STRIPE_WEBHOOK_SECRET = whsec_... (จาก Webhook endpoint ของ production เท่านั้น)
#    - STRIPE_PRICE_PLUS_MONTHLY / YEARLY = price_... (จาก Product รายเดือน/รายปีใน Stripe)
#    - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY = pk_live_... (ถ้ามีการใช้ Stripe.js / Elements ภายหลัง)
# 6. Thai PSP (optional): BILLING_THAI_PROVIDER + BILLING_THAI_WEBHOOK_SECRET — see .env.example
# 7. Email verification (signup): RESEND_API_KEY + EMAIL_FROM — verify domain in Resend; NEXT_PUBLIC_APP_URL ต้องตรง URL จริง

services:
  - type: web
    name: gamedu-app
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: NPM_CONFIG_PRODUCTION=false npm ci && npm run build
    startCommand: npm run start
    preDeployCommand: npx prisma db push
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: SOCKET_IO_CORS_ORIGIN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Public signup is enabled in production; credentials users must verify email before login.
      # Keep the explicit false values to override older Blueprint/env values that temporarily
      # disabled this flow while email verification was being repaired.
      - key: ENABLE_PUBLIC_SIGNUP
        value: "true"
      - key: NEXT_PUBLIC_ENABLE_PUBLIC_SIGNUP
        value: "true"
      - key: DISABLE_PUBLIC_SIGNUP
        value: "false"
      - key: NEXT_PUBLIC_DISABLE_PUBLIC_SIGNUP
        value: "false"
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: SKIP_EMAIL_VERIFICATION
        value: "false"
      - key: NEXT_PUBLIC_SKIP_EMAIL_VERIFICATION
        value: "false"
      - key: NEXT_PUBLIC_CLASSROOM_GAMIFICATION_ENABLED
        value: "true"
      - key: NEXT_PUBLIC_NEGAMON_BATTLE_HOST_ENABLED
        value: "true"
      - key: GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PLUS_YEARLY
        sync: false
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: BILLING_THAI_PROVIDER
        sync: false
      - key: BILLING_THAI_WEBHOOK_SECRET
        sync: false
      - key: OMISE_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_OMISE_PUBLIC_KEY
        sync: false
      - key: OMISE_PLUS_MONTHLY_SATANG
        sync: false
      - key: OMISE_PLUS_YEARLY_SATANG
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: RATE_LIMIT_STORE
        value: auto
      - key: AUDIT_LOG_SINK
        value: auto
      - key: HEALTHCHECK_DB_TIMEOUT_MS
        value: "3000"
      # ── LINE Bot ──────────────────────────────────────────────────────────
      # Required for LINE bot to work (webhook + push messages)
      - key: LINE_BOT_ENABLED
        value: "true"
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CLASSROOM_BINDING_SECRET
        sync: false
      # Used as footer URL in LINE Flex reminder cards; falls back to APP_BASE_URL
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Secret for POST /api/jobs/line-reminders (external cron trigger)
      # Falls back to ADMIN_SECRET if not set
      - key: LINE_REMINDER_CRON_SECRET
        sync: false

  # ── LINE Auto-Reminder Cron Job ──────────────────────────────────────────
  # Fires POST /api/jobs/line-reminders every 30 min as a reliable external
  # trigger — works alongside the in-process scheduler (delivery dedup via
  # unique reminderKey prevents double-sends).
  #
  # Requires Render paid plan. Remove or comment out if using free plan
  # (in-process scheduler in server.ts handles reminders automatically).
  - type: cron
    name: gamedu-line-reminder-cron
    runtime: node
    region: singapore
    schedule: "*/30 * * * *"
    buildCommand: "true"
    startCommand: >
      node -e "
        const secret = process.env.LINE_REMINDER_CRON_SECRET || process.env.ADMIN_SECRET;
        const url = (process.env.NEXT_PUBLIC_APP_URL || process.env.APP_BASE_URL) + '/api/jobs/line-reminders';
        fetch(url, { method: 'POST', headers: { 'x-cron-secret': secret } })
          .then(r => r.json()).then(console.log).catch(console.error);
      "
    envVars:
      - key: LINE_REMINDER_CRON_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
